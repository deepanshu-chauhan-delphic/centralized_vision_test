<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Form</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input, textarea { width: 100%; padding: 8px; border: 1px solid #ddd; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        .result { margin-top: 20px; padding: 10px; border: 1px solid #ddd; }
        .success { background: #d4edda; border-color: #c3e6cb; }
        .error { background: #f8d7da; border-color: #f5c6cb; }
    </style>
</head>
<body>
    <h1>Test Form Submission</h1>
    
    <form id="testForm" action="php/submit-form.php" method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label>First Name:</label>
            <input type="text" name="first_name" value="Test User" required>
        </div>
        
        <div class="form-group">
            <label>Last Name:</label>
            <input type="text" name="last_name" value="Test Last" required>
        </div>
        
        <div class="form-group">
            <label>Email:</label>
            <input type="email" name="email" value="test@example.com" required>
        </div>
        
        <div class="form-group">
            <label>Property Name:</label>
            <input type="text" name="property_name" value="Test Property" required>
        </div>
        
        <div class="form-group">
            <label>Shipping Address:</label>
            <input type="text" name="shipping_address" value="123 Test St" required>
        </div>
        
        <div class="form-group">
            <label>State:</label>
            <select name="state" required>
                <option value="CA">CA - California</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>City:</label>
            <input type="text" name="city" value="Test City" required>
        </div>
        
        <div class="form-group">
            <label>Zip Code:</label>
            <input type="text" name="zip_code" value="12345" required>
        </div>
        
        <div class="form-group">
            <label>Phone:</label>
            <input type="tel" name="phone" value="555-1234" required>
        </div>
        
        <div class="form-group">
            <label>Sign Text:</label>
            <textarea name="sign_text" rows="3">Test sign text</textarea>
        </div>
        
        <div class="form-group">
            <label>Logo Upload (optional):</label>
            <input type="file" name="logo_upload" accept=".jpg,.jpeg,.png">
        </div>
        
        <button type="submit">Submit Test Form</button>
    </form>
    
    <div id="result" class="result" style="display: none;"></div>

    <script>
        document.getElementById('testForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const resultDiv = document.getElementById('result');
            
            // Show loading
            resultDiv.style.display = 'block';
            resultDiv.className = 'result';
            resultDiv.innerHTML = 'Submitting...';
            
            fetch(this.action, {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                console.log('Full response:', data);
                
                resultDiv.style.display = 'block';
                resultDiv.className = data.success ? 'result success' : 'result error';
                
                let html = '<h3>' + (data.success ? 'Success!' : 'Error') + '</h3>';
                html += '<p>' + data.message + '</p>';
                
                if (data.debug) {
                    html += '<h4>Debug Information:</h4>';
                    html += '<pre>' + JSON.stringify(data.debug, null, 2) + '</pre>';
                }
                
                resultDiv.innerHTML = html;
            })
            .catch(error => {
                console.error('Error:', error);
                resultDiv.style.display = 'block';
                resultDiv.className = 'result error';
                resultDiv.innerHTML = '<h3>Error</h3><p>' + error.message + '</p>';
            });
        });
    </script>
</body>
</html>
